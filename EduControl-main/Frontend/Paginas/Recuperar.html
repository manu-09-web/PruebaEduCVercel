<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduControl - Recuperar Contraseña</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <div class="contenedor-principal">
        
        <div class="panel-izquierdo">
            <img src="../Img/campana.svg" class="icono-fondo campana" alt="fondo">
            <img src="../Img/lapíz.svg" class="icono-fondo lapiz" alt="fondo">
            <img src="../Img/hoja.svg" class="icono-fondo hoja" alt="fondo">
            <img src="../Img/escuela.svg" class="icono-fondo escuela" alt="fondo">
            <img src="../Img/mochila.svg" class="icono-fondo mochila" alt="fondo">
            <img src="../Img/graduado.svg" class="icono-fondo graduado" alt="fondo">

            <div class="mensaje-bienvenida">
                <img src="../Img/SombreroLogin.svg" class="icono-centro" alt="Sombrero">
                <h1>Bienvenido<br>a<br><span class="texto-resaltado">EduControl</span></h1>
            </div>
        </div>

        <div class="panel-derecho">
            <div class="tarjeta-login">
                
                <div class="contenedor-icono-circular">
                    <img src="../Img/candado-recuperar.svg" alt="Candado Recuperar">
                </div>

                <h2>Recuperar contraseña</h2>
                <p class="subtitulo">¿Olvidaste tu contraseña?</p>
                
                <p class="texto-instruccion">
                    Ingresa tu correo o nombre de usuario para enviarte un código de recuperación
                </p>

                <div class="grupo-input">
                    <label>Correo o nombre de usuario</label>
                    <input type="text">
                </div>

                <button class="boton-ingresar boton-con-icono">
                    <img src="../Img/icono-enviar.svg" alt="Enviar"> Enviar código
                </button>

                <a href="/Frontend/index.html" class="enlace-volver">
                    <img src="../Img/icono-volver.svg" alt="Volver"> Volver al inicio de sesión
                </a>

            </div>
        </div>
    </div>
</body>
</html>
