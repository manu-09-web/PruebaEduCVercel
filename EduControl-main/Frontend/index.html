<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduControl - Inicio de Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="contenedor-principal">
        
        <div class="panel-izquierdo">
            <img src="Img/campana.svg" class="icono-fondo campana">
            <img src="Img/lapíz.svg" class="icono-fondo lapiz" >
            <img src="Img/hoja.svg" class="icono-fondo hoja" >
            <img src="Img/escuela.svg" class="icono-fondo escuela" >
            <img src="Img/mochila.svg" class="icono-fondo mochila" >
            <img src="Img/graduado.svg" class="icono-fondo graduado">

            <div class="mensaje-bienvenida">
                <img src="Img/SombreroLogin.svg" class="icono-centro" >
                <h1>Bienvenido<br>a<br><span class="texto-resaltado">EduControl</span></h1>
            </div>
        </div>

        <div class="panel-derecho">
            <div class="tarjeta-login">
                <h2>Inicio de Sesión</h2>
                <p class="subtitulo">¿Cómo desea ingresar?</p>

                <div class="selector-rol">
                    <button class="boton-rol activo" id="btn-director">Director</button>
                    <button class="boton-rol" id="btn-docente">Docente</button>
                </div>

                <form id="formulario-login">
                    <div class="grupo-input">
                        <label for="usuario">Correo o nombre usuario</label>
                        <input type="text" id="usuario" required>
                    </div>

                    <div class="grupo-input">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" required>
                    </div>

                    <a href="/Frontend/Paginas/Recuperar.html" class="enlace-olvido">¿Olvidó su contraseña?</a>

                    <button type="submit" class="boton-ingresar">Iniciar Sesión</button>
                </form>
            </div>
        </div>

    </div>
    <script src="JS/script.js"></script>
</body>
</html>
