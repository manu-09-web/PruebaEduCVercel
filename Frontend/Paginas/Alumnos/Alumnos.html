<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduControl - Cuenta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../CSS/alumnos.css">
</head>
<body class="dashboard-body">

    <header class="dashboard-header">
        <div class="logo-header">
            <img src="../../Img/Logos/LogoEduControl.png" alt="EduControl">
        </div>
        <div class="logos-institucionales">
            <img src="../../Img/Logos/logoPrimaria.png" alt="Escuela Ignacio Zaragoza">
            <img src="../../Img/Logos/secretaria.png" alt="SEP">
        </div>
    </header>

    <aside class="dashboard-sidebar">
        <nav class="menu-lateral">
            <a href="../Cuenta/Cuenta.html" class="item-menu">
                <img src="../../Img/IconosDashboard/Cuenta.svg" alt="Cuenta"> Cuenta
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Alumno.svg" alt="Alumno"> Alumno
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Evaluacion.svg" alt="Evaluación"> Evaluación
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Registro.svg" alt="Registro"> Registro
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Calificacion.svg" alt="Calificación"> Calificación
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Gruposvg.svg" alt="Grupo"> Grupo
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Reportes.svg" alt="Reportes"> Reportes
            </a>
        </nav>
    </aside>

    <main class="dashboard-main">
        <h2 class="titulo-perfil">Gestión de alumnos</h2>
        
        <div class="contenedor-gestion">
            <div class="controles-superiores">
                <div class="buscar-grupo">
                    <label>Buscar: </label>
                    <input type="text" placeholder="">
                    <img src="../../Img/IconosAlumnos/lupa.svg">
                </div>
                <button class="btn-agregar" onclick="window.location.href='RegistrarAlumno.html'">
                    <img src="../../Img/IconosAlumnos/agregar.svg"> Agregar Alumno
                </button>
            </div>

            <div class="tabla-contenedor">
                <table class="tabla-alumnos">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Grupo</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuerpo">
                    </tbody>
                </table>
            </div>
            </div>
    </main>

    <footer class="dashboard-footer">
        <img src="../../Img/Logos/LogoUp.png" alt="Logo Universidad">
        <p>Ingeniería en Tecnologías de la Información e Innovación Digital<br>Universidad Politécnica de Chiapas</p>
    </footer>

    <script src="../../JS/alumnos.js"></script>
    <div id="toast-container"></div>
</body>
</html>
