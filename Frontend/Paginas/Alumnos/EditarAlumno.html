<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduControl - Editar Alumno</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../CSS/alumnos.css">
</head>
<body class="dashboard-body">

    <header class="dashboard-header">
        <div class="logo-header">
            <img src="../../Img/Logos/LogoEduControl.png" alt="EduControl">
        </div>
        <div class="logos-institucionales">
            <img src="../../Img/Logos/logoPrimaria.png" alt="Escuela Ignacio Zaragoza">
            <img src="../../Img/Logos/secretaria.png" alt="SEP">
        </div>
    </header>

    <aside class="dashboard-sidebar">
        <nav class="menu-lateral">
            <a href="../Cuenta/Cuenta.html" class="item-menu">
                <img src="../../Img/IconosDashboard/Cuenta.svg" alt="Cuenta"> Cuenta
            </a>
            <a href="../Alumnos/Alumnos.html" class="item-menu">
                <img src="../../Img/IconosDashboard/Alumno.svg" alt="Alumno"> Alumno
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Evaluacion.svg" alt="Evaluación"> Evaluación
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Registro.svg" alt="Registro"> Registro
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Calificacion.svg" alt="Calificación"> Calificación
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Gruposvg.svg" alt="Grupo"> Grupo
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Reportes.svg" alt="Reportes"> Reportes
            </a>
        </nav>
    </aside>
    <main class="dashboard-main">
        <div class="header-main">
            <h2 class="titulo-perfil">Editar información del alumno</h2>
        </div>

        <form id="form-editar" class="contenedor-informacion">
            <div>
                <label>Nombre(s):</label>
                <input type="text" id="edit-nombre" class="campo-dato" required>
            </div>

            <div>
                <label>Apellido Paterno:</label>
                <input type="text" id="edit-apellido-paterno" class="campo-dato" required>
            </div>

            <div>
                <label>Apellido Materno:</label>
                <input type="text" id="edit-apellido-materno" class="campo-dato" required>
            </div>

            <div>
                <label>Grupo:</label>
                <select id="edit-grupo" class="campo-dato">
                    <option value="1">4 A</option>
                    <option value="2">4 B</option>
                    <option value="3">5 A</option>
                </select>
            </div>

            <div>
                <label>No. Lista:</label>
                <input type="number" id="edit-lista" class="campo-dato" required>
            </div>

            <div>
                <label>Tareas:</label>
                <input type="text" id="edit-tareas" class="campo-dato">
            </div>

            <div>
                <label>Disciplina:</label>
                <input type="text" id="edit-disciplina" class="campo-dato">
            </div>

            <div>
                <label>Asistencia:</label>
                <input type="text" id="edit-asistencia" class="campo-dato">
            </div>

            <div>
                <label>Examen:</label>
                <input type="text" id="edit-examen" class="campo-dato">
            </div>

            <div>
                <label>Participación:</label>
                <input type="text" id="edit-participacion" class="campo-dato">
            </div>

            <div>
                <label>Promedio final:</label>
                <input type="number" step="0.1" id="edit-promedio" class="campo-dato">
            </div>

            <div class="contenedor-botones">
                <button type="submit" class="btn-guardar">Guardar Cambios</button>
                <button type="button" class="btn-cancelarEdicion" onclick="window.history.back()">Cancelar</button>
            </div>
        </form>
    </main>
    <footer class="dashboard-footer">
        <img src="../../Img/Logos/LogoUp.png" alt="Logo Universidad">
        <p>Ingeniería en Tecnologías de la Información e Innovación Digital<br>Universidad Politécnica de Chiapas</p>
    </footer>
    <script src="../../JS/alumnos.js"></script>
    <div id="toast-container"></div>
</body>
</html>
