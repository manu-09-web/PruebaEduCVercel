<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduControl - Ver Alumno</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../CSS/alumnos.css">
</head>
<body class="dashboard-body">

    <header class="dashboard-header">
        <div class="logo-header">
            <img src="../../Img/Logos/LogoEduControl.png" alt="EduControl">
        </div>
        <div class="logos-institucionales">
            <img src="../../Img/Logos/logoPrimaria.png" alt="Escuela Ignacio Zaragoza">
            <img src="../../Img/Logos/secretaria.png" alt="SEP">
        </div>
    </header>

    <aside class="dashboard-sidebar">
        <nav class="menu-lateral">
            <a href="../Cuenta/Cuenta.html" class="item-menu">
                <img src="../../Img/IconosDashboard/Cuenta.svg" alt="Cuenta"> Cuenta
            </a>
            <a href="../Alumnos/Alumnos.html" class="item-menu">
                <img src="../../Img/IconosDashboard/Alumno.svg" alt="Alumno"> Alumno
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Evaluacion.svg" alt="Evaluación"> Evaluación
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Registro.svg" alt="Registro"> Registro
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Calificacion.svg" alt="Calificación"> Calificación
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Gruposvg.svg" alt="Grupo"> Grupo
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Reportes.svg" alt="Reportes"> Reportes
            </a>
        </nav>
    </aside>

    <main class="dashboard-main">
        <div class="header-main">
            <h2 class="titulo-perfil">Información del alumno</h2>
        </div>
        
        <div class="contenedor-informacion">
        <div class="campo-nombre">
            <label>Alumno:</label>
            <div id="info-nombre" class="campo-dato">Cargando...</div>
        </div>

        <div>
            <label>Grupo:</label>
            <div id="info-grupo" class="campo-dato">---</div>
        </div>
        <div>
            <label>No. Lista:</label>
            <div id="info-lista" class="campo-dato">---</div>
        </div>

        <div>
            <label>Tareas:</label>
            <div id="info-tareas" class="campo-dato">---</div>
        </div>
        <div>
            <label>Disciplina:</label>
            <div id="info-disciplina" class="campo-dato">---</div>
        </div>

        <div>
            <label>Asistencia:</label>
            <div id="info-asistencia" class="campo-dato">---</div>
        </div>
        <div>
            <label>Examen:</label>
            <div id="info-examen" class="campo-dato">---</div>
        </div>

        <div>
            <label>Participación:</label>
            <div id="info-participacion" class="campo-dato">---</div>
        </div>
        <div>
            <label>Promedio final:</label>
            <div id="info-promedio" class="campo-dato">---</div>
        </div>
    </div>
    </main>

    <footer class="dashboard-footer">
        <img src="../../Img/Logos/LogoUp.png" alt="Logo Universidad">
        <p>Ingeniería en Tecnologías de la Información e Innovación Digital<br>Universidad Politécnica de Chiapas</p>
    </footer>

    <div id="modal-eliminar" class="modal-overlay" style="display: none;">
        <div class="modal-contenido">
            <h3>¿Estás seguro que deseas eliminar este alumno?</h3>
            <div class="acciones-modal">
                <button id="btn-cancelar" class="btn-cancelar"><img src="../../Img/IconosAlumnos/eliminarAlumno.svg">Cancelar</button>
                <button id="btn-confirmar" class="btn-confirmar"><img src="../../Img/IconosAlumnos/confirmarEliminacion.svg">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="../../JS/alumnos.js"></script>
</body>
</html>
