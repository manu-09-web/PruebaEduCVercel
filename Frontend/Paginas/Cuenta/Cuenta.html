<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduControl - Cuenta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../CSS/cuenta.css">
    
</head>
<body class="dashboard-body">

    <header class="dashboard-header">
        <div class="logo-header">
            <img src="../../Img/Logos/LogoEduControl.png" alt="EduControl">
        </div>
        <div class="logos-institucionales">
            <img src="../../Img/Logos/logoPrimaria.png" alt="Escuela Ignacio Zaragoza">
            <img src="../../Img/Logos/secretaria.png" alt="SEP">
        </div>
    </header>

    <aside class="dashboard-sidebar">
        <nav class="menu-lateral">
            <a href="../Cuenta/Cuenta.html" class="item-menu">
                <img src="../../Img/IconosDashboard/Cuenta.svg" alt="Cuenta"> Cuenta
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Alumno.svg" alt="Alumno"> Alumno
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Evaluacion.svg" alt="Evaluación"> Evaluación
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Registro.svg" alt="Registro"> Registro
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Calificacion.svg" alt="Calificación"> Calificación
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Gruposvg.svg" alt="Grupo"> Grupo
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Reportes.svg" alt="Reportes"> Reportes
            </a>
        </nav>
    </aside>
    <main class="dashboard-main">
    <h2 class="titulo-perfil">Mi perfil:</h2>

        <div class="contenedor-formulario">
            <div class="columna-foto">
                <a href="EditarFoto.html" style="text-decoration: none; color: inherit;">
                    <div class="foto-placeholder">
                        <img id="preview-foto" src="../../Img/avatar-default.png" alt="Avatar">
                    </div>
                    <p class="texto-foto">Foto de perfil <img src="../../Img/IconosCuenta/editarperfil.svg" class="editar-icono"></p>
                </a>
            </div>

            <div class="columna-datos">
                <label>Nombre:</label>
                <input type="text" value="EduControl">

                <label>Nombre del usuario: <a href="#" class="link-editar" onclick="abrirModal()">Editar</a></label>
                <input type="text" id="input-username" value="EduControl" readonly>

                <div id="modal-editar-usuario" class="modal-overlay">
                    <div class="contenedor-modal">
                        <h3 class="titulo-modal">Editar usuario:</h3>

                        <label>Usuario Actual:</label>
                        <input type="text" id="usuario-actual" readonly>

                        <label>Nuevo usuario:</label>
                        <input type="text" id="usuario-nuevo" placeholder="Escribe el nuevo nombre de usuario">

                        <div class="botones-modal">
                            <button type="button" class="boton-cancelar" onclick="cerrarModal()">
                                Cancelar <img src="../../Img/IconosCuenta/cancelar.svg" alt="Cancelar">
                            </button>
                            <button type="button" class="boton-guardar" onclick="guardarUsuario()">
                                Guardar <img src="../../Img/IconosCuenta/guardar.svg" alt="Guardar">
                            </button>
                        </div>
                    </div>
                </div>

                <label>Rol:</label>
                <div class="grupo-rol">
                    <button class="boton-rol active">Director</button>
                    <button class="boton-rol">Docente</button>
                </div>

                <label>Correo:</label>
                <input type="email" value="EduControltest10@gmail.com">

                <label>Contraseña: <a href="#" class="link-editar" onclick="abrirModalContrasena()">Editar</a></label>
                <input type="password" id="input-password" value="12345678" readonly>

                <div id="modal-editar-contrasena" class="modal-overlay">
                    <div class="contenedor-modal">
                        <h3 class="titulo-modal">Editar contraseña:</h3>

                        <label>Contraseña actual:</label>
                        <input type="password" id="contrasena-actual" placeholder="Escribe tu contraseña actual">

                        <label>Nueva contraseña:</label>
                        <input type="password" id="contrasena-nueva" placeholder="Escribe la nueva contraseña">

                        <label>Confirmar nueva contraseña:</label>
                        <input type="password" id="contrasena-confirmar" placeholder="Repite la nueva contraseña">

                        <div class="botones-modal">
                            <button type="button" class="boton-cancelar" onclick="cerrarModalContrasena()">
                                Cancelar <img src="../../Img/IconosCuenta/cancelar.svg" alt="Cancelar">
                            </button>
                            <button type="button" class="boton-guardar" onclick="guardarContrasena()">
                                Guardar <img src="../../Img/IconosCuenta/guardar.svg" alt="Guardar">
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="dashboard-footer">
        <img src="../../Img/Logos/LogoUp.png" alt="Logo Universidad">
        <p>Ingeniería en Tecnologías de la Información e Innovación Digital<br>Universidad Politécnica de Chiapas</p>
    </footer>
    <script src="../../JS/perfil.js"></script>
    <div id="toast-container"></div>
</body>

</html>
