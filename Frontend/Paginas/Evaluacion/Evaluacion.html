<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduControl - Cuenta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../CSS/Evaluacion.css">
    
</head>
<body class="dashboard-body">

    <header class="dashboard-header">
        <div class="logo-header">
            <img src="../../Img/Logos/LogoEduControl.png" alt="EduControl">
        </div>
        <div class="logos-institucionales">
            <img src="../../Img/Logos/logoPrimaria.png" alt="Escuela Ignacio Zaragoza">
            <img src="../../Img/Logos/secretaria.png" alt="SEP">
        </div>
    </header>

    <aside class="dashboard-sidebar">
        <nav class="menu-lateral">
            <a href="../Cuenta/Cuenta.html" class="item-menu">
                <img src="../../Img/IconosDashboard/Cuenta.svg" alt="Cuenta"> Cuenta
            </a>
            <a href="../Alumnos/Alumnos.html" class="item-menu">
                <img src="../../Img/IconosDashboard/Alumno.svg" alt="Alumno"> Alumno
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Evaluacion.svg" alt="Evaluación"> Evaluación
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Registro.svg" alt="Registro"> Registro
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Calificacion.svg" alt="Calificación"> Calificación
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Gruposvg.svg" alt="Grupo"> Grupo
            </a>
            <a href="#" class="item-menu">
                <img src="../../Img/IconosDashboard/Reportes.svg" alt="Reportes"> Reportes
            </a>
        </nav>
    </aside>

    <main class="dashboard-main">
        <div class="header-evaluacion">
            <h2 class="titulo-perfil">Criterios de Evaluación</h2>
        </div>

        <div class="tabla-contenedor-full">
            <table class="tabla-evaluacion">
                <thead>
                    <tr>
                        <th>Criterios de evaluación</th>
                        <th>Porcentaje (%)</th>
                    </tr>
                </thead>
                <tbody id="evaluacion-cuerpo">
                    <tr><td>Tareas</td><td><input type="number" value="20"> %</td></tr>
                    <tr><td>Asistencia</td><td><input type="number" value="20"> %</td></tr>
                    <tr><td>Participación</td><td><input type="number" value="10"> %</td></tr>
                    <tr><td>Disciplina</td><td><input type="number" value="20"> %</td></tr>
                    <tr><td>Examen</td><td><input type="number" value="30"> %</td></tr>
                    <tr class="fila-total"><td>Total</td><td>100%</td></tr>
                </tbody>
            </table>
        </div>

        <div class="acciones-evaluacion">
            <button class="btn-limpiar">Limpiar <img src="../../Img/IconosEvaluacion/limpiar.svg" alt="limpiar"></button>
            <button class="btn-guardar">Guardar<img src="../../Img/IconosEvaluacion/guardar.svg" alt="guardar"></button>
        </div>
    </main>
    <footer class="dashboard-footer">
        <img src="../../Img/Logos/LogoUp.png" alt="Logo Universidad">
        <p>Ingeniería en Tecnologías de la Información e Innovación Digital<br>Universidad Politécnica de Chiapas</p>
    </footer>
    <script src="../../JS/evaluacion.js"></script>
    <div id="toast-container"></div>
</body>

</html>
