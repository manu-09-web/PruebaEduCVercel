<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduControl - Registrar Examen</title>
    <link class="styles-link" rel="stylesheet" href="../../CSS/Contenido.css">
    <link rel="stylesheet" href="../../CSS/FormulariosRegistro.css">
</head>
<body class="dashboard-body">
    <div id="alerta-exito" class="alerta-toast">
        <div class="icono-check">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 6L9 17L4 12" stroke="#155724" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="texto-alerta">Datos Guardados correctamente</div>
    </div>

    <header class="dashboard-header">
        <div class="logo-header">
            <img src="../../Img/Logos/LogoEduControl.png" alt="EduControl">
        </div>
        <div class="logos-institucionales">
            <img src="../../Img/Logos/logoPrimaria.png" alt="Escuela Ignacio Zaragoza">
            <img src="../../Img/Logos/secretaria.png" alt="SEP">
        </div>
    </header>

    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <nav class="menu-lateral">
                <a href="../Cuenta/Cuenta.html" class="item-menu">
                    <img src="../../Img/IconosDashboard/Cuenta.svg" alt="Cuenta"> Cuenta
                </a>
                <a href="../Alumnos/Alumnos.html" class="item-menu">
                    <img src="../../Img/IconosDashboard/Alumno.svg" alt="Alumno"> Alumno
                </a>
                <a href="../Evaluacion/Evaluacion.html" class="item-menu">
                    <img src="../../Img/IconosDashboard/Evaluacion.svg" alt="Evaluación"> Evaluación
                </a>
                <a href="../Registro/principal.html" class="item-menu item-activo">
                    <img src="../../Img/IconosDashboard/Registro.svg" alt="Registro"> Registro
                </a>
                <a href="../Calificaciones/menucali.html" class="item-menu">
                    <img src="../../Img/IconosDashboard/Calificacion.svg" alt="Calificación"> Calificación
                </a>
                <a href="../Grupos/listagrupos.html" class="item-menu">
                    <img src="../../Img/IconosDashboard/Gruposvg.svg" alt="Grupo"> Grupo
                </a>
                <a href="../Reportes/menurepo.html" class="item-menu">
                    <img src="../../Img/IconosDashboard/Reportes.svg" alt="Reportes"> Reportes
                </a>
            </nav>
        </aside>

        <main class="dashboard-main">
            <form id="form-registro" class="contenedor-tarjeta-blanca" onsubmit="event.preventDefault(); guardarRegistro();">
                <h1 class="titulo-formulario">Registrar Examen</h1>

                <div class="fila-filtros-superiores">
                    <div class="grupo-campo-filtro">
                        <label>Grado:</label>
                        <input type="text" id="input-grado" class="input-bloqueado-bd" value="" readonly>
                    </div>

                    <div class="grupo-campo-filtro">
                        <label>Grupo:</label>
                        <input type="text" id="input-grupo" class="input-bloqueado-bd" value="" readonly>
                    </div>

                    <div class="grupo-campo-filtro">
                        <label>Periodo:</label>
                        <select id="select-periodo" class="select-pildora" disabled>
                            <option value="">Cargando...</option>
                        </select>
                    </div>

                    <div class="grupo-campo-filtro">
                        <label>Ciclo Escolar:</label>
                        <input type="text" id="input-ciclo" class="input-bloqueado-bd" value="" readonly>
                    </div>
                </div>

                <div class="seccion-datos-examen">
                    <div class="fila-formulario-horizontal">
                        <label class="label-ancho-fijo">Examen:</label>
                        <input type="text" id="input-examen-nombre" class="input-linea-texto" required>
                    </div>

                    <div class="fila-formulario-horizontal">
                        <label class="label-ancho-fijo">Campo Formativo:</label>
                        <select id="select-campo" class="select-pildora-largo" required>
                            <option value="" disabled selected>Seleccione un campo...</option>
                        </select>
                    </div>

                    <div class="fila-totales-pregunta">
                        <div class="item-total-corto">
                            <label>Total de preguntas:</label>
                            <input type="number" min="1" id="input-total-preguntas" class="input-pildora-corto" required>
                        </div>
                        <div class="item-total-corto">
                            <label>Puntos por pregunta:</label>
                            <input type="text" id="input-puntos-pregunta" class="input-pildora-corto">
                        </div>
                    </div>
                </div>

                <div class="contenedor-tabla-scroll">
                    <table class="tabla-registro-datos">
                        <thead>
                            <tr>
                                <th style="width: 8%;">No.</th>
                                <th style="width: 52%;">Alumno</th>
                                <th style="width: 20%;">Respuestas correctas</th>
                                <th style="width: 20%;">Calificación (%)</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-cuerpo">
                            <tr><td colspan="4">Cargando alumnos...</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="contenedor-boton-final">
                    <button type="submit" class="boton-guardar-estilo">
                        Guardar <img src="../../Img/icono-enviar.svg" alt="Guardar">
                    </button>
                </div>
            </form>
        </main>
    </div>

    <footer class="dashboard-footer">
        <img src="../../Img/Logos/LogoUp.png" alt="UP Chiapas">
        <p>Ingeniería en Tecnologías de la Información e Innovación Digital<br>Universidad Politécnica de Chiapas</p>
    </footer>

    <script src="../../JS/registrarExamen.js"></script>
</body>
</html>
