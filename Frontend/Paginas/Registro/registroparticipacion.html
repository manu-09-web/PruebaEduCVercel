<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduControl - Registrar Participación</title>
    <link class="styles-link" rel="stylesheet" href="../../CSS/Contenido.css">
    <link rel="stylesheet" href="../../CSS/FormulariosRegistro.css">
</head>
<body class="dashboard-body">
    <div id="alerta-exito" class="alerta-toast">
        <div class="icono-check">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 6L9 17L4 12" stroke="#155724" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="texto-alerta">Datos Guardados correctamente</div>
    </div>

    <header class="dashboard-header">
        <div class="logo-header">
            <img src="../../Img/Logos/LogoEduControl.png" alt="EduControl">
        </div>
        <div class="logos-institucionales">
            <img src="../../Img/Logos/logoPrimaria.png" alt="Escuela Ignacio Zaragoza">
            <img src="../../Img/Logos/secretaria.png" alt="SEP">
        </div>
    </header>

    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <nav class="menu-lateral">
                <a href="../Bienvenida.html" class="item-menu"><img src="../../Img/IconosDashboard/Cuenta.svg" alt="Cuenta"> Cuenta</a>
                <a href="#" class="item-menu"><img src="../../Img/IconosDashboard/Alumno.svg" alt="Alumno"> Alumno</a>
                <a href="#" class="item-menu"><img src="../../Img/IconosDashboard/Evaluacion.svg" alt="Evaluación"> Evaluación</a>
                <a href="principal.html" class="item-menu item-activo"><img src="../../Img/IconosDashboard/Registro.svg" alt="Registro"> Registro</a>
                <a href="#" class="item-menu"><img src="../../Img/IconosDashboard/Calificacion.svg" alt="Calificación"> Calificación</a>
                <a href="#" class="item-menu"><img src="../../Img/IconosDashboard/Gruposvg.svg" alt="Grupo"> Grupo</a>
                <a href="#" class="item-menu"><img src="../../Img/IconosDashboard/Reportes.svg" alt="Reportes"> Reportes</a>
            </nav>
        </aside>

        <main class="dashboard-main">
            <form id="form-registro" class="contenedor-tarjeta-blanca" onsubmit="event.preventDefault(); mostrarAlertaExito();">
                <h1 class="titulo-formulario">Registrar Participación</h1>
                
                <div class="fila-filtros-superiores">
                    <div class="grupo-campo-filtro">
                        <label>Grado:</label>
                        <input type="text" class="input-bloqueado-bd" value="6°" readonly>
                    </div>
                    <div class="grupo-campo-filtro">
                        <label>Grupo:</label>
                        <input type="text" class="input-bloqueado-bd" value="A" readonly>
                    </div>
                    <div class="grupo-campo-filtro">
                        <label>Periodo:</label>
                        <select class="select-pildora" required>
                            <option value="" disabled selected>Seleccione...</option>
                            <option value="1">1° Periodo</option>
                            <option value="2">2° Periodo</option>
                            <option value="3">3° Periodo</option>
                        </select>
                    </div>
                    <div class="grupo-campo-filtro">
                        <label>Ciclo Escolar:</label>
                        <input type="text" class="input-bloqueado-bd" value="2025 - 2026" readonly>
                    </div>
                </div>

                <div class="seccion-datos-examen">
                    <div class="fila-formulario-horizontal">
                        <label class="label-ancho-fijo">Actividad / Tema:</label>
                        <input type="text" class="input-linea-texto" placeholder="Ej. Participación - Debate de Historia" required>
                    </div>

                    <div class="fila-formulario-horizontal">
                        <label class="label-ancho-fijo">Campo Formativo:</label>
                        <select class="select-pildora-largo" required>
                            <option value="" disabled selected>Seleccione un campo...</option>
                            <option value="lenguajes">Lenguajes</option>
                            <option value="saberes">Saberes y Pensamiento Científico</option>
                            <option value="etica">Ética, Naturaleza y Sociedades</option>
                            <option value="humano">De lo Humano y lo Comunitario</option>
                        </select>
                    </div>
                </div>

                <div class="contenedor-tabla-scroll">
                    <table class="tabla-registro-datos">
                        <thead>
                            <tr>
                                <th style="width: 8%;">No.</th>
                                <th style="width: 62%; text-align: left; padding-left: 15px;">Alumno</th>
                                <th style="width: 30%;">Puntuación</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>1</td>
                                <td class="celda-nombre-alumno">Abadía Solís Ana Laura</td>
                                <td>
                                    <input type="number" class="input-tabla-pildora" placeholder="0" min="0" step="1">
                                </td>
                            </tr>
                            <tr>
                                <td>2</td>
                                <td class="celda-nombre-alumno">Aguilar Ruiz Carlos Alberto</td>
                                <td>
                                    <input type="number" class="input-tabla-pildora" placeholder="0" min="0" step="1">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="contenedor-boton-final">
                    <button type="submit" class="boton-guardar-estilo">
                        Guardar <img src="../../Img/icono-enviar.svg" alt="Guardar">
                    </button>
                </div>
            </form>
        </main>
    </div>

    <footer class="dashboard-footer">
        <img src="../../Img/Logos/LogoUp.png" alt="UP Chiapas">
        <p>Ingeniería en Tecnologías de la Información e Innovación Digital<br>Universidad Politécnica de Chiapas</p>
    </footer>

    <script>
        function mostrarAlertaExito() {
            const alerta = document.getElementById('alerta-exito');
            alerta.classList.add('mostrar-alerta');
            setTimeout(() => { alerta.classList.remove('mostrar-alerta'); }, 3500);
        }
    </script>
</body>
</html>
