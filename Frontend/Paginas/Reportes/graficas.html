<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduControl - Gráficas</title>
    <link class="styles-link" rel="stylesheet" href="../../CSS/Contenido.css">
    <link class="recurso-estilo" rel="stylesheet" href="../../CSS/reportes.css">
</head>
<body class="dashboard-body">

    <header class="dashboard-header">
        <div class="logo-header">
            <img src="../../Img/Logos/LogoEduControl.png" alt="EduControl">
        </div>
        <div class="logos-institucionales">
            <img src="../../Img/Logos/logoPrimaria.png" alt="Escuela Ignacio Zaragoza">
            <img src="../../Img/Logos/secretaria.png" alt="SEP">
        </div>
    </header>

    <div class="dashboard-layout">
        
        <aside class="dashboard-sidebar">
            <nav class="menu-lateral">
                <a href="../Bienvenida.html" class="item-menu"><img src="../../Img/IconosDashboard/Cuenta.svg" alt="Cuenta"> Cuenta</a>
                <a href="#" class="item-menu"><img src="../../Img/IconosDashboard/Alumno.svg" alt="Alumno"> Alumno</a>
                <a href="#" class="item-menu"><img src="../../Img/IconosDashboard/Evaluacion.svg" alt="Evaluación"> Evaluación</a>
                <a href="../Registro/principal.html" class="item-menu"><img src="../../Img/IconosDashboard/Registro.svg" alt="Registro"> Registro</a>
                <a href="../Calificaciones/menucali.html" class="item-menu"><img src="../../Img/IconosDashboard/Calificacion.svg" alt="Calificación"> Calificación</a>
                <a href="../Grupos/listagrupos.html" class="item-menu"><img src="../../Img/IconosDashboard/Gruposvg.svg" alt="Grupo"> Grupo</a>
                <a href="menurepo.html" class="item-menu item-activo"><img src="../../Img/IconosDashboard/Reportes.svg" alt="Reportes"> Reportes</a>
            </nav>
        </aside>

        <main class="dashboard-main">
            <div class="contenedor-tarjeta-blanca" style="padding: 35px 40px;">
                
                <h1 class="titulo-formulario" style="font-size: 2rem; font-weight: bold; color: #000000; margin-bottom: 25px; margin-top: 0;">
                    Gráficas
                </h1>

                <div class="barra-filtros-graficas">
                    
                    <div class="grupo-filtro">
                        <label for="tipoReporte">Tipo de reporte:</label>
                        <div class="select-personalizado">
                            <select id="tipoReporte">
                                <option value="grupo">Por grupo</option>
                                <option value="general">General</option>
                            </select>
                        </div>
                    </div>

                    <div class="grupo-filtro">
                        <label for="periodo">Periodo:</label>
                        <div class="select-personalizado">
                            <select id="periodo">
                                <option value="3">3er. periodo</option>
                                <option value="1">1er. periodo</option>
                                <option value="2">2do. periodo</option>
                            </select>
                        </div>
                    </div>

                    <div class="grupo-filtro-btn">
                        <button type="button" class="btn-generar-reporte">Generar</button>
                    </div>

                </div>

                <div class="contenedor-render-grafica">
                    <div class="box-grafico-interno">
                        <canvas id="canvasGraficaBarras"></canvas>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <footer class="dashboard-footer">
        <img src="../../Img/Logos/LogoUp.png" alt="UP Chiapas">
        <p>Ingeniería en Tecnologías de la Información e Innovación Digital<br>Universidad Politécnica de Chiapas</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../../JS/script.js"></script>
    <div id="notificacion-exito" class="toast-notificacion">
        <div class="toast-contenido">
            <svg class="icon-check" viewBox="0 0 24 24" fill="none" stroke="#0F5132" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            <div class="toast-texto">
                <span class="txt-principal">Datos Generados</span>
                <span class="txt-secundario">con éxito</span>
            </div>
        </div>
    </div>
</body>
</html>
